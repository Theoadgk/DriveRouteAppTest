<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cardiff Routes">
<meta name="theme-color" content="#0f1117">
<title>Cardiff Test Routes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surf:#181c25;--surf2:#1f2330;
  --border:rgba(255,255,255,0.08);
  --accent:#4ade80;--accent2:#60a5fa;--accent3:#f59e0b;--red:#f87171;--purple:#a78bfa;
  --muted:rgba(255,255,255,0.45);--text:#f0f2f5;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:12px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#shell{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#header{padding:10px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);z-index:100}
#header-title{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-family:var(--mono)}
#header-sub{font-size:11px;color:var(--muted);margin-top:1px}
#gps-status{display:flex;align-items:center;gap:6px}
#gps-dot{width:9px;height:9px;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background .3s}
#gps-dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent)}
#gps-dot.searching{background:var(--accent3);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#gps-label{font-size:11px;color:var(--muted);font-family:var(--mono)}
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tab{flex:1;padding:11px 6px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.panel.active{display:block}
#panel-map{display:none;flex-direction:column}
#panel-map.active{display:flex!important}

/* ROUTES */
.filters{padding:12px 14px;border-bottom:1px solid var(--border)}
.f-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;background:var(--surf);color:var(--muted);font-family:var(--font);transition:all .15s}
.chip.on{background:var(--accent);color:#051205;border-color:var(--accent)}
.chip.warn.on{background:var(--accent3);color:#1a0f00;border-color:var(--accent3)}
.chip.info.on{background:var(--accent2);color:#001528;border-color:var(--accent2)}
.route-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;padding-bottom:90px}
.rcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:border-color .15s}
.rcard.sel{border-color:var(--accent);background:rgba(74,222,128,.06)}
.rname{font-size:13px;font-weight:600}
.rcenter{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.rbadges{display:flex;gap:4px;flex-wrap:wrap;margin:7px 0 5px}
.badge{font-size:10px;padding:3px 7px;border-radius:20px;font-weight:500;font-family:var(--mono)}
.bg{background:rgba(74,222,128,.15);color:var(--accent)}
.ba{background:rgba(245,158,11,.15);color:var(--accent3)}
.bb{background:rgba(96,165,250,.15);color:var(--accent2)}
.br{background:rgba(248,113,113,.15);color:var(--red)}
.rpreview{font-size:11px;color:var(--muted);line-height:1.5}
.start-btn{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#051205;border:none;padding:16px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);padding-bottom:calc(16px + var(--safe-bot));z-index:200;transition:opacity .15s}
.start-btn:disabled{opacity:.3;cursor:default}

/* MAP */
#leaflet-map{flex:1;min-height:0;z-index:1}
#map-bottom{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:8px 14px;padding-bottom:calc(8px + var(--safe-bot))}
#map-route-name{font-size:12px;font-weight:600;margin-bottom:4px}
#map-legend{display:flex;gap:10px;flex-wrap:wrap}
.leg-item{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#loading-overlay{position:absolute;inset:0;background:rgba(15,17,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loading-overlay.hide{display:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{font-size:13px;color:var(--muted);font-family:var(--mono)}

/* NAV - BIG INSTRUCTIONS */
.nav-missed{background:var(--red);color:white;text-align:center;padding:10px 14px;font-size:13px;font-weight:600;display:none}
.nav-missed.show{display:block}
.nav-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.nav-step-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.prog-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.nav-curr{margin:12px 14px;background:var(--surf);border:2px solid rgba(74,222,128,.4);border-radius:var(--r);padding:16px}
.nav-street-label{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.nav-street{font-size:28px;font-weight:700;line-height:1.15;color:var(--text)}
.nav-inst{font-size:20px;color:var(--accent);margin-top:10px;font-weight:600;display:flex;align-items:center;gap:10px;line-height:1.2}
.nav-inst-icon{font-size:32px;line-height:1;flex-shrink:0}
.nav-dist{font-size:12px;color:var(--muted);margin-top:8px;font-family:var(--mono)}
.up-label{padding:0 14px 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.up-list{padding:0 14px;display:flex;flex-direction:column;gap:4px}
.up-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf);border-radius:8px;border:1px solid var(--border)}
.up-num{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;text-align:center}
.up-street{font-size:13px;font-weight:600}
.up-inst{font-size:11px;color:var(--muted)}
.nav-ctrls{display:flex;gap:8px;padding:14px;padding-bottom:calc(14px + var(--safe-bot))}
.nbtn{flex:1;padding:14px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.nbtn:active{background:var(--surf2)}
.nbtn.primary{background:var(--accent);color:#051205;border-color:var(--accent)}
.nbtn:disabled{opacity:.3;pointer-events:none}
.empty{padding:32px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}
.leaflet-container{background:#1a1e2a}
.leaflet-tile{filter:brightness(.75) saturate(.6)}
</style>
</head>
<body>
<div id="shell">
  <div id="header">
    <div>
      <div id="header-title">Cardiff Test Routes</div>
      <div id="header-sub">Llanishen DVSA Navigator</div>
    </div>
    <div id="gps-status">
      <span id="gps-label">GPS off</span>
      <div id="gps-dot"></div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" id="tab-routes" onclick="showTab('routes')">📋 Routes</button>
    <button class="tab" id="tab-map" onclick="showTab('map')">🗺 Map</button>
    <button class="tab" id="tab-nav" onclick="showTab('nav')">🧭 Navigate</button>
  </div>
  <div id="panels">
    <!-- ROUTES -->
    <div class="panel active" id="panel-routes">
      <div class="filters">
        <div class="f-label">Include road types</div>
        <div class="chip-row">
          <button class="chip on" data-type="residential" onclick="toggleType(this)">🏠 Residential</button>
          <button class="chip on" data-type="roundabout" onclick="toggleType(this)">🔄 Roundabouts</button>
          <button class="chip on" data-type="trafficlight" onclick="toggleType(this)">🚦 Traffic Lights</button>
          <button class="chip warn on" data-type="dual" onclick="toggleType(this)">🛣 Dual C'way</button>
          <button class="chip info on" data-type="main" onclick="toggleType(this)">🚗 Main Roads</button>
        </div>
        <div class="f-label" style="margin-top:10px">Sort by</div>
        <div class="chip-row">
          <button class="chip on" data-sort="roundabouts" onclick="setSort(this)">Most roundabouts</button>
          <button class="chip" data-sort="lights" onclick="setSort(this)">Most lights</button>
          <button class="chip" data-sort="steps" onclick="setSort(this)">Longest route</button>
        </div>
      </div>
      <div class="route-list" id="route-list"></div>
      <button class="start-btn" id="start-btn" disabled onclick="beginNav()">Select a route to navigate</button>
    </div>
    <!-- MAP -->
    <div class="panel" id="panel-map">
      <div id="loading-overlay" class="hide">
        <div class="spinner"></div>
        <div id="loading-text">Fetching road route…</div>
      </div>
      <div id="leaflet-map"></div>
      <div id="map-bottom">
        <div id="map-route-name" style="color:var(--muted)">No route selected</div>
        <div id="map-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div>Start/End</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent2)"></div>Roundabout</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent3)"></div>Lights</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Dual c'way</div>
          <div class="leg-item"><div class="leg-dot" style="background:#fff;opacity:.5"></div>You</div>
        </div>
      </div>
    </div>
    <!-- NAV -->
    <div class="panel" id="panel-nav">
      <div id="nav-content"><div class="empty">Select a route from the Routes tab, then tap Navigate.</div></div>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedRoute = null;
let navStep = 0;
let sortBy = 'roundabouts';
let includeTypes = new Set(['residential','roundabout','trafficlight','dual','main']);
let map = null;
let routePolyline = null;
let waypointMarkers = [];
let userMarker = null;
let userAccCircle = null;
let watchId = null;
let userLat = null, userLng = null;
let gpsReady = false;
let missedTurnActive = false;
let activeTab = 'routes';
let cachedRouteGeo = {};

const TYPE_COLOR = {
  residential:'#6b7280', trafficlight:'#f59e0b',
  roundabout:'#60a5fa', dual:'#f87171', main:'#a78bfa'
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

const INST_ICON = inst => {
  if (/roundabout/i.test(inst)) return '🔄';
  if (/traffic light|lights/i.test(inst)) return '🚦';
  if (/left/i.test(inst)&&!/right/i.test(inst)) return '↰';
  if (/right/i.test(inst)&&!/left/i.test(inst)) return '↱';
  if (/ahead/i.test(inst)) return '↑';
  if (/depart/i.test(inst)) return '🚗';
  return '→';
};

// ── GPS ───────────────────────────────────────────────────────────────────────
function startGPS(){
  if(!navigator.geolocation) return;
  const dot=document.getElementById('gps-dot'), lbl=document.getElementById('gps-label');
  dot.className='searching'; lbl.textContent='Searching…';
  watchId=navigator.geolocation.watchPosition(pos=>{
    dot.className='on'; lbl.textContent='GPS ✓'; gpsReady=true;
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    updateUserMarker(userLat,userLng,pos.coords.accuracy);
    if(activeTab==='nav'&&selectedRoute) checkProximity();
  },()=>{dot.className='';lbl.textContent='GPS ✗';},{enableHighAccuracy:true,maximumAge:3000,timeout:15000});
}

function updateUserMarker(lat,lng,acc){
  if(!map) return;
  if(!userMarker){
    const icon=L.divIcon({className:'',html:`<div style="width:18px;height:18px;border-radius:50%;background:#4ade80;border:3px solid white;box-shadow:0 0 10px rgba(74,222,128,.7)"></div>`,iconSize:[18,18],iconAnchor:[9,9]});
    userMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
    userAccCircle=L.circle([lat,lng],{radius:acc||20,color:'#4ade80',fillColor:'#4ade80',fillOpacity:0.08,weight:1}).addTo(map);
  } else {
    userMarker.setLatLng([lat,lng]);
    if(userAccCircle){userAccCircle.setLatLng([lat,lng]);if(acc)userAccCircle.setRadius(acc);}
  }
}

// ── PROXIMITY / AUTO-ADVANCE ──────────────────────────────────────────────────
function checkProximity(){
  if(!selectedRoute||!gpsReady) return;
  const steps=selectedRoute.steps;
  if(navStep>=steps.length-1) return;
  const next=steps[navStep+1];
  const dist=haversine(userLat,userLng,next.lat,next.lng);

  // auto-advance
  if(dist<ADVANCE_DIST){
    navStep=Math.min(navStep+1,steps.length-1);
    missedTurnActive=false;
    renderNav();
    if(map) map.panTo([steps[navStep].lat,steps[navStep].lng],{animate:true});
    return;
  }

  // missed turn — if we're too far from both current AND next waypoint
  const curr=steps[navStep];
  const distCurr=haversine(userLat,userLng,curr.lat,curr.lng);
  if(distCurr>MISSED_DIST&&dist>MISSED_DIST){
    if(!missedTurnActive){
      missedTurnActive=true;
      renderNav();
    }
  } else {
    if(missedTurnActive){missedTurnActive=false;renderNav();}
  }
}

// ── GEOAPIFY ROUTING ──────────────────────────────────────────────────────────
async function fetchRoadRoute(steps){
  const key=GEOAPIFY_KEY;
  const coords=steps.map(s=>`${s.lng},${s.lat}`).join('|');
  const url=`https://api.geoapify.com/v1/routing?waypoints=${steps.map(s=>`${s.lat},${s.lng}`).join('|')}&mode=drive&apiKey=${key}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Routing API error '+r.status);
  const data=await r.json();
  if(!data.features||!data.features.length) throw new Error('No route returned');
  // extract all coordinates from the route geometry
  const coords2=[];
  data.features.forEach(f=>{
    if(f.geometry.type==='LineString') f.geometry.coordinates.forEach(c=>coords2.push([c[1],c[0]]));
    else if(f.geometry.type==='MultiLineString') f.geometry.coordinates.forEach(line=>line.forEach(c=>coords2.push([c[1],c[0]])));
  });
  return coords2;
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap(){
  if(map) return;
  map=L.map('leaflet-map',{center:[51.502,-3.228],zoom:13,zoomControl:false,attributionControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  startGPS();
}

async function renderMap(){
  initMap();
  setTimeout(()=>map&&map.invalidateSize(),80);
  const nameEl=document.getElementById('map-route-name');
  if(!selectedRoute){nameEl.textContent='No route selected';nameEl.style.color='var(--muted)';return;}
  nameEl.textContent=selectedRoute.name; nameEl.style.color='var(--text)';

  // clear old layers
  if(routePolyline){map.removeLayer(routePolyline);routePolyline=null;}
  waypointMarkers.forEach(m=>map.removeLayer(m)); waypointMarkers=[];

  const steps=selectedRoute.steps;
  const cacheKey=selectedRoute.id;

  // show loading
  const ov=document.getElementById('loading-overlay');
  const lt=document.getElementById('loading-text');
  ov.classList.remove('hide'); lt.textContent='Fetching road route…';

  let roadCoords=null;
  try{
    if(cachedRouteGeo[cacheKey]){
      roadCoords=cachedRouteGeo[cacheKey];
    } else {
      roadCoords=await fetchRoadRoute(steps);
      cachedRouteGeo[cacheKey]=roadCoords;
    }
    routePolyline=L.polyline(roadCoords,{color:'#4ade80',weight:5,opacity:0.85}).addTo(map);
  } catch(e){
    lt.textContent='Offline — showing straight lines';
    await new Promise(r=>setTimeout(r,1200));
    // fallback straight lines coloured by type
    for(let i=0;i<steps.length-1;i++){
      const pl=L.polyline([[steps[i].lat,steps[i].lng],[steps[i+1].lat,steps[i+1].lng]],{color:TYPE_COLOR[steps[i].type]||'#6b7280',weight:4,opacity:.7}).addTo(map);
      waypointMarkers.push(pl);
    }
  }
  ov.classList.add('hide');

  // waypoint markers
  steps.forEach((s,i)=>{
    const isEnd=i===0||i===steps.length-1;
    const col=isEnd?'#4ade80':(TYPE_COLOR[s.type]||'#6b7280');
    const sz=isEnd?20:14;
    const lbl=isEnd?(i===0?'S':'E'):String(i+1);
    const icon=L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2px solid rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:${sz*0.5}px;font-weight:700;color:#000;font-family:monospace">${lbl}</div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const m=L.marker([s.lat,s.lng],{icon}).bindPopup(`<b>${s.street}</b><br><small>${s.inst}</small>`).addTo(map);
    waypointMarkers.push(m);
  });

  const allPts=steps.map(s=>[s.lat,s.lng]);
  map.fitBounds(L.latLngBounds(allPts).pad(0.1));
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(tab){
  activeTab=tab;
  ['routes','map','nav'].forEach(t=>{
    const p=document.getElementById('panel-'+t);
    const isMap=t==='map';
    if(t===tab){ p.classList.add('active'); if(isMap)p.style.display='flex'; else p.style.display='block'; }
    else { p.classList.remove('active'); p.style.display='none'; }
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='map') renderMap();
  if(tab==='nav') renderNav();
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function toggleType(btn){
  const t=btn.dataset.type;
  if(includeTypes.has(t)){includeTypes.delete(t);btn.classList.remove('on');}
  else{includeTypes.add(t);btn.classList.add('on');}
  renderRouteList();
}
function setSort(btn){
  document.querySelectorAll('[data-sort]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); sortBy=btn.dataset.sort; renderRouteList();
}
function filteredRoutes(){
  return ROUTES.filter(r=>{
    if(r.tags.dual&&!includeTypes.has('dual')) return false;
    return Object.entries(r.tags).some(([k,v])=>v&&includeTypes.has(k));
  }).sort((a,b)=>{
    if(sortBy==='roundabouts') return b.roundabouts-a.roundabouts;
    if(sortBy==='lights') return b.lights-a.lights;
    return b.steps.length-a.steps.length;
  });
}

// ── ROUTE LIST ────────────────────────────────────────────────────────────────
function renderRouteList(){
  const list=document.getElementById('route-list');
  const routes=filteredRoutes();
  if(!routes.length){list.innerHTML='<div class="empty">No routes match your filters.</div>';return;}
  list.innerHTML=routes.map(r=>{
    const sel=selectedRoute&&selectedRoute.id===r.id;
    const badges=[
      r.roundabouts?`<span class="badge bb">🔄 ${r.roundabouts}</span>`:'',
      r.lights?`<span class="badge ba">🚦 ${r.lights}</span>`:'',
      r.tags.dual?`<span class="badge br">🛣 Dual</span>`:'',
      `<span class="badge bg">${r.steps.length} steps</span>`
    ].filter(Boolean).join('');
    return `<div class="rcard ${sel?'sel':''}" onclick="selectRoute(${r.id})">
      <div class="rname">${r.name}</div>
      <div class="rcenter">${r.center}</div>
      <div class="rbadges">${badges}</div>
      <div class="rpreview">${r.steps.slice(0,2).map(s=>s.street).join(' → ')}…</div>
    </div>`;
  }).join('');
  const btn=document.getElementById('start-btn');
  if(selectedRoute){btn.disabled=false;btn.textContent=`▶ Start Route ${selectedRoute.id}`;}
  else{btn.disabled=true;btn.textContent='Select a route to navigate';}
}

function selectRoute(id){
  selectedRoute=ROUTES.find(r=>r.id===id);
  navStep=0; missedTurnActive=false;
  renderRouteList();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function beginNav(){
  if(!selectedRoute) return;
  navStep=0; missedTurnActive=false;
  showTab('nav');
}

function renderNav(){
  const content=document.getElementById('nav-content');
  if(!selectedRoute){content.innerHTML='<div class="empty">Select a route from the Routes tab, then tap Navigate.</div>';return;}
  const steps=selectedRoute.steps;
  const total=steps.length;
  const curr=steps[navStep];
  const pct=Math.round((navStep/(total-1))*100);
  const upcoming=steps.slice(navStep+1,navStep+4);
  const isLast=navStep>=total-1;

  // distance to next step
  let distStr='';
  if(gpsReady&&!isLast){
    const next=steps[navStep+1];
    const d=haversine(userLat,userLng,next.lat,next.lng);
    distStr=d<1000?`${Math.round(d)}m to next waypoint`:`${(d/1000).toFixed(1)}km to next waypoint`;
  }

  content.innerHTML=`
    ${missedTurnActive?`<div class="nav-missed show">⚠️ Possible missed turn — check your position</div>`:''}
    <div class="nav-hdr">
      <span class="nav-step-lbl">${navStep+1} / ${total}</span>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="nav-step-lbl">${pct}%</span>
    </div>
    <div class="nav-curr">
      <div class="nav-street-label">${navStep===0?'🚦 Start':'📍 Current street'}</div>
      <div class="nav-street">${curr.street}</div>
      <div class="nav-inst"><span class="nav-inst-icon">${INST_ICON(curr.inst)}</span>${curr.inst}</div>
      ${distStr?`<div class="nav-dist">📏 ${distStr}</div>`:''}
    </div>
    ${upcoming.length?`
      <div class="up-label">Coming up</div>
      <div class="up-list">${upcoming.map((s,i)=>`
        <div class="up-item">
          <span class="up-num">${navStep+i+2}</span>
          <div style="flex:1"><div class="up-street">${s.street}</div><div class="up-inst">${s.inst}</div></div>
          <span style="font-size:20px;margin-left:8px">${INST_ICON(s.inst)}</span>
        </div>`).join('')}
      </div>`
    :`<div class="empty" style="padding:16px 20px">🏁 Final step — return to Test Centre and park safely.</div>`}
    <div class="nav-ctrls">
      <button class="nbtn" ${navStep===0?'disabled':''} onclick="navGo(-1)">← Back</button>
      <button class="nbtn" onclick="showTab('map')">🗺 Map</button>
      <button class="nbtn primary" ${isLast?'disabled':''} onclick="navGo(1)">${isLast?'Done ✓':'Next →'}</button>
    </div>`;
}

function navGo(dir){
  navStep=Math.max(0,Math.min(selectedRoute.steps.length-1,navStep+dir));
  missedTurnActive=false;
  renderNav();
  if(map&&selectedRoute){const s=selectedRoute.steps[navStep];map.panTo([s.lat,s.lng],{animate:true});}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderRouteList();
setTimeout(startGPS,300);
</script>
