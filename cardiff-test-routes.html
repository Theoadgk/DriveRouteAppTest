<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cardiff Routes">
<meta name="theme-color" content="#0f1117">
<title>Cardiff Test Routes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f1117;--surf:#181c25;--surf2:#1f2330;
    --border:rgba(255,255,255,0.08);
    --accent:#4ade80;--accent2:#60a5fa;--accent3:#f59e0b;--red:#f87171;--purple:#a78bfa;
    --muted:rgba(255,255,255,0.45);--text:#f0f2f5;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    --r:12px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  }

  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

  /* SHELL */
  #shell{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
  #header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);z-index:100}
  #header-title{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-family:var(--mono)}
  #header-sub{font-size:11px;color:var(--muted);margin-top:1px}
  #gps-dot{width:8px;height:8px;border-radius:50%;background:#6b7280;flex-shrink:0;transition:background .3s}
  #gps-dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  #gps-dot.searching{background:var(--accent3);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* TABS */
  #tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
  .tab{flex:1;padding:11px 6px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* PANELS */
  #panels{flex:1;overflow:hidden;position:relative}
  .panel{position:absolute;inset:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
  .panel.active{display:block}

  /* ── ROUTES PANEL ── */
  .filters{padding:12px 14px;border-bottom:1px solid var(--border)}
  .f-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;cursor:pointer;background:var(--surf);color:var(--muted);font-family:var(--font);transition:all .15s}
  .chip.on{background:var(--accent);color:#051205;border-color:var(--accent)}
  .chip.warn.on{background:var(--accent3);color:#1a0f00;border-color:var(--accent3)}
  .chip.info.on{background:var(--accent2);color:#001528;border-color:var(--accent2)}

  .route-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
  .rcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:border-color .15s}
  .rcard:active{background:var(--surf2)}
  .rcard.sel{border-color:var(--accent);background:rgba(74,222,128,.06)}
  .rname{font-size:13px;font-weight:600}
  .rcenter{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
  .rbadges{display:flex;gap:4px;flex-wrap:wrap;margin:7px 0 5px}
  .badge{font-size:10px;padding:3px 7px;border-radius:20px;font-weight:500;font-family:var(--mono)}
  .bg{background:rgba(74,222,128,.15);color:var(--accent)}
  .ba{background:rgba(245,158,11,.15);color:var(--accent3)}
  .bb{background:rgba(96,165,250,.15);color:var(--accent2)}
  .br{background:rgba(248,113,113,.15);color:var(--red)}
  .rpreview{font-size:11px;color:var(--muted);line-height:1.5}

  .start-btn{position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#051205;border:none;padding:16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;padding-bottom:calc(16px + var(--safe-bot));z-index:200}
  .start-btn:disabled{opacity:.3;cursor:default}

  /* ── MAP PANEL ── */
  #map-panel{display:none;flex-direction:column}
  #map-panel.active{display:flex}
  #leaflet-map{flex:1;min-height:0;z-index:1}
  #map-bottom{flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 14px;padding-bottom:calc(10px + var(--safe-bot))}
  #map-route-name{font-size:13px;font-weight:600;margin-bottom:4px}
  #map-legend{display:flex;gap:10px;flex-wrap:wrap}
  .leg-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* ── NAV PANEL ── */
  .nav-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
  .nav-step-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .prog-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

  .nav-curr{margin:14px;background:var(--surf);border:1px solid rgba(74,222,128,.3);border-radius:var(--r);padding:14px}
  .nav-street{font-size:20px;font-weight:600;line-height:1.2}
  .nav-inst{font-size:13px;color:var(--accent);margin-top:7px;font-weight:500;display:flex;align-items:center;gap:7px}
  .nav-inst-icon{font-size:22px;line-height:1}

  .up-label{padding:0 14px 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
  .up-list{padding:0 14px;display:flex;flex-direction:column;gap:4px}
  .up-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surf);border-radius:8px;border:1px solid var(--border)}
  .up-num{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;text-align:center}
  .up-street{font-size:12px;font-weight:500}
  .up-inst{font-size:11px;color:var(--muted)}

  .nav-ctrls{display:flex;gap:8px;padding:14px;padding-bottom:calc(14px + var(--safe-bot))}
  .nbtn{flex:1;padding:12px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--surf);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s}
  .nbtn:active{background:var(--surf2)}
  .nbtn.primary{background:var(--accent);color:#051205;border-color:var(--accent)}
  .nbtn:disabled{opacity:.3;pointer-events:none}

  .empty{padding:32px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}

  /* Leaflet overrides */
  .leaflet-container{background:#1a1e2a}
  .leaflet-tile{filter:brightness(.8) saturate(.7) hue-rotate(180deg)}
</style>
</head>
<body>
<div id="shell">
  <div id="header">
    <div>
      <div id="header-title">Cardiff Test Routes</div>
      <div id="header-sub">Llanishen DVSA — Practice Navigator</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="gps-label" style="font-size:11px;color:var(--muted);font-family:var(--mono)">GPS off</span>
      <div id="gps-dot"></div>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" id="tab-routes" onclick="showTab('routes')">📋 Routes</button>
    <button class="tab" id="tab-map" onclick="showTab('map')">🗺 Map</button>
    <button class="tab" id="tab-nav" onclick="showTab('nav')">🧭 Navigate</button>
  </div>

  <div id="panels">
    <!-- ROUTES -->
    <div class="panel active" id="panel-routes">
      <div class="filters">
        <div class="f-label">Include road types</div>
        <div class="chip-row">
          <button class="chip on" data-type="residential" onclick="toggleType(this)">🏠 Residential</button>
          <button class="chip on" data-type="roundabout" onclick="toggleType(this)">🔄 Roundabouts</button>
          <button class="chip on" data-type="trafficlight" onclick="toggleType(this)">🚦 Traffic Lights</button>
          <button class="chip warn on" data-type="dual" onclick="toggleType(this)">🛣 Dual C'way</button>
          <button class="chip info on" data-type="main" onclick="toggleType(this)">🚗 Main Roads</button>
        </div>
        <div class="f-label" style="margin-top:10px">Sort by</div>
        <div class="chip-row">
          <button class="chip on" data-sort="roundabouts" onclick="setSort(this)">Most roundabouts</button>
          <button class="chip" data-sort="lights" onclick="setSort(this)">Most lights</button>
          <button class="chip" data-sort="steps" onclick="setSort(this)">Longest route</button>
        </div>
      </div>
      <div class="route-list" id="route-list"></div>
      <button class="start-btn" id="start-btn" disabled onclick="beginNav()">Select a route to navigate</button>
    </div>

    <!-- MAP -->
    <div class="panel" id="panel-map" style="display:none;flex-direction:column">
      <div id="leaflet-map"></div>
      <div id="map-bottom">
        <div id="map-route-name" style="color:var(--muted)">No route selected — choose from Routes tab</div>
        <div id="map-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div>Start / End</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent2)"></div>Roundabout</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--accent3)"></div>Traffic lights</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Dual c'way</div>
          <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Main road</div>
        </div>
      </div>
    </div>

    <!-- NAV -->
    <div class="panel" id="panel-nav">
      <div id="nav-content"><div class="empty">Select a route from the Routes tab, then tap Navigate.</div></div>
    </div>
  </div>
</div>

  {

    tags:{residential:true,roundabout:true,trafficlight:true,dual:false,main:true},
    roundabouts:5, lights:4,
    steps:[
      {street:"Test Centre (Norbury Rd)",   inst:"Depart — right, left, end of road right",type:"residential", lat:51.5082, lng:-3.2311},
      {street:"St Fagans / Waungron Rd",    inst:"Traffic lights ahead → left",            type:"trafficlight",lat:51.5100, lng:-3.2280},
      {street:"Ely Rd",                     inst:"Turn right",                             type:"main",        lat:51.5085, lng:-3.2245},
      {street:"St Michaels Rd",             inst:"Right, left, end of road → left",        type:"residential", lat:51.5068, lng:-3.2215},
      {street:"Caewal Rd",                  inst:"End of road → left",                     type:"residential", lat:51.5052, lng:-3.2195},
      {street:"Pencisely Rd",               inst:"3rd right",                              type:"residential", lat:51.5038, lng:-3.2170},
      {street:"Greenwich Rd",               inst:"End of road → right",                    type:"residential", lat:51.5025, lng:-3.2145},
      {street:"Pencisely Rd",               inst:"Turn right",                             type:"residential", lat:51.5012, lng:-3.2168},
      {street:"Clive Rd",                   inst:"2nd left",                               type:"residential", lat:51.5000, lng:-3.2192},
      {street:"Romilly Rd",                 inst:"Traffic lights → left",                  type:"trafficlight",lat:51.4985, lng:-3.2210},
      {street:"Llandaff Rd",                inst:"Traffic lights ahead",                   type:"trafficlight",lat:51.4975, lng:-3.2250},
      {street:"Cardiff Rd",                 inst:"3x Traffic lights ahead",                type:"trafficlight",lat:51.4960, lng:-3.2295},
      {street:"Bridge St",                  inst:"Roundabout → ahead",                     type:"roundabout",  lat:51.4950, lng:-3.2330},
      {street:"Llantrisant Rd",             inst:"4x Roundabouts ahead",                   type:"roundabout",  lat:51.4968, lng:-3.2370},
      {street:"Crofft Y Genau",             inst:"End of road → left",                     type:"residential", lat:51.4988, lng:-3.2340},
      {street:"Cardiff / St Fagans Rd",     inst:"Traffic lights → 3rd right → Test Centre",type:"trafficlight",lat:51.5082, lng:-3.2311}
    ]

// ── STATE ─────────────────────────────────────────────────────────────────────
let selectedRoute = null;
let navStep = 0;
let sortBy = 'roundabouts';
let includeTypes = new Set(['residential','roundabout','trafficlight','dual','main']);
let map = null;
let routeLayer = null;
let markerLayer = null;
let userMarker = null;
let watchId = null;
let activeTab = 'routes';

// ── GPS ───────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  const dot = document.getElementById('gps-dot');
  const lbl = document.getElementById('gps-label');
  dot.className = 'searching';
  lbl.textContent = 'Searching…';
  watchId = navigator.geolocation.watchPosition(
    pos => {
      dot.className = 'on';
      lbl.textContent = 'GPS on';
      const {latitude:lat, longitude:lng} = pos.coords;
      if (!map) return;
      if (!userMarker) {
        const icon = L.divIcon({
          className:'',
          html:`<div style="width:16px;height:16px;border-radius:50%;background:#4ade80;border:3px solid white;box-shadow:0 0 8px rgba(74,222,128,.6)"></div>`,
          iconSize:[16,16], iconAnchor:[8,8]
        });
        userMarker = L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
      } else {
        userMarker.setLatLng([lat,lng]);
      }
    },
    err => { dot.className = ''; lbl.textContent = 'GPS err'; },
    {enableHighAccuracy:true, maximumAge:5000, timeout:10000}
  );
}

// ── MAP INIT ──────────────────────────────────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('leaflet-map', {
    center:[51.502, -3.228], zoom:13,
    zoomControl:false, attributionControl:true
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  startGPS();
}

const TYPE_COLOR = {
  residential:'#6b7280', trafficlight:'#f59e0b',
  roundabout:'#60a5fa', dual:'#f87171', main:'#a78bfa'
};

function renderMap() {
  initMap();
  const nameEl = document.getElementById('map-route-name');
  if (!selectedRoute) { nameEl.textContent='No route selected'; nameEl.style.color='var(--muted)'; return; }
  nameEl.textContent = selectedRoute.name;
  nameEl.style.color = 'var(--text)';

  if (routeLayer) map.removeLayer(routeLayer);
  if (markerLayer) map.removeLayer(markerLayer);
  routeLayer = L.layerGroup();
  markerLayer = L.layerGroup();

  const steps = selectedRoute.steps;
  const latlngs = steps.map(s => [s.lat, s.lng]);

  // draw polyline segments coloured by type
  for (let i=0; i<steps.length-1; i++) {
    L.polyline([[steps[i].lat,steps[i].lng],[steps[i+1].lat,steps[i+1].lng]], {
      color: TYPE_COLOR[steps[i].type]||'#6b7280',
      weight:4, opacity:0.75
    }).addTo(routeLayer);
  }

  steps.forEach((s,i) => {
    const isEnd = i===0||i===steps.length-1;
    const col = isEnd ? '#4ade80' : (TYPE_COLOR[s.type]||'#6b7280');
    const r = isEnd ? 9 : 6;
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:${r*2}px;height:${r*2}px;border-radius:50%;background:${col};border:2px solid rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:${r-1}px;font-weight:600;color:#000;font-family:monospace">${isEnd?(i===0?'S':'E'):i+1}</div>`,
      iconSize:[r*2,r*2], iconAnchor:[r,r]
    });
    L.marker([s.lat,s.lng],{icon}).bindPopup(`<b>${s.street}</b><br><small>${s.inst}</small>`).addTo(markerLayer);
  });

  routeLayer.addTo(map);
  markerLayer.addTo(map);
  const bounds = L.latLngBounds(latlngs).pad(0.1);
  map.fitBounds(bounds);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  ['routes','map','nav'].forEach(t => {
    const p = document.getElementById('panel-'+t);
    p.classList.toggle('active', t===tab);
    p.style.display = t==='map' ? (tab==='map'?'flex':'none') : (t===tab?'block':'none');
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='map') { renderMap(); setTimeout(()=>map&&map.invalidateSize(),50); }
  if (tab==='nav') renderNav();
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function toggleType(btn) {
  const t = btn.dataset.type;
  if (includeTypes.has(t)) { includeTypes.delete(t); btn.classList.remove('on'); }
  else { includeTypes.add(t); btn.classList.add('on'); }
  renderRouteList();
}
function setSort(btn) {
  document.querySelectorAll('[data-sort]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  sortBy = btn.dataset.sort;
  renderRouteList();
}
function filteredRoutes() {
  return ROUTES.filter(r => {
    if (r.tags.dual && !includeTypes.has('dual')) return false;
    return Object.entries(r.tags).some(([k,v])=>v&&includeTypes.has(k));
  }).sort((a,b)=>{
    if (sortBy==='roundabouts') return b.roundabouts-a.roundabouts;
    if (sortBy==='lights') return b.lights-a.lights;
    return b.steps.length-a.steps.length;
  });
}

// ── ROUTE LIST ────────────────────────────────────────────────────────────────
function renderRouteList() {
  const list = document.getElementById('route-list');
  const routes = filteredRoutes();
  if (!routes.length) {
    list.innerHTML='<div class="empty">No routes match your filters. Try enabling more road types.</div>';
    return;
  }
  list.innerHTML = routes.map(r => {
    const sel = selectedRoute && selectedRoute.id===r.id;
    const badges = [
      r.roundabouts ? `<span class="badge bb">🔄 ${r.roundabouts} roundabouts</span>` : '',
      r.lights ? `<span class="badge ba">🚦 ${r.lights} lights</span>` : '',
      r.tags.dual ? `<span class="badge br">🛣 Dual c'way</span>` : '',
      `<span class="badge bg">${r.steps.length} steps</span>`
    ].filter(Boolean).join('');
    const preview = r.steps.slice(0,2).map(s=>s.street).join(' → ')+'…';
    return `<div class="rcard ${sel?'sel':''}" onclick="selectRoute(${r.id})">
      <div class="rname">${r.name}</div>
      <div class="rcenter">${r.center}</div>
      <div class="rbadges">${badges}</div>
      <div class="rpreview">${preview}</div>
    </div>`;
  }).join('');

  const btn = document.getElementById('start-btn');
  if (selectedRoute) { btn.disabled=false; btn.textContent=`Start Route ${selectedRoute.id} — Navigate →`; }
  else { btn.disabled=true; btn.textContent='Select a route to navigate'; }
}

function selectRoute(id) {
  selectedRoute = ROUTES.find(r=>r.id===id);
  navStep = 0;
  renderRouteList();
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
const INST_ICON = inst => {
  if (/roundabout/i.test(inst)) return '🔄';
  if (/traffic light|lights/i.test(inst)) return '🚦';
  if (/left/i.test(inst) && !/right/i.test(inst)) return '↰';
  if (/right/i.test(inst) && !/left/i.test(inst)) return '↱';
  if (/ahead/i.test(inst)) return '↑';
  if (/depart/i.test(inst)) return '🚗';
  return '→';
};

function beginNav() {
  if (!selectedRoute) return;
  navStep = 0;
  showTab('nav');
}

function renderNav() {
  const content = document.getElementById('nav-content');
  if (!selectedRoute) {
    content.innerHTML='<div class="empty">Select a route from the Routes tab, then tap Navigate.</div>';
    return;
  }
  const steps = selectedRoute.steps;
  const total = steps.length;
  const curr = steps[navStep];
  const pct = Math.round((navStep/(total-1))*100);
  const upcoming = steps.slice(navStep+1, navStep+4);
  const isLast = navStep>=total-1;

  content.innerHTML = `
    <div class="nav-hdr">
      <span class="nav-step-lbl">${navStep+1} / ${total}</span>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="nav-step-lbl">${pct}%</span>
    </div>
    <div class="nav-curr">
      <div style="font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${navStep===0?'Start':'Current street'}</div>
      <div class="nav-street">${curr.street}</div>
      <div class="nav-inst"><span class="nav-inst-icon">${INST_ICON(curr.inst)}</span>${curr.inst}</div>
    </div>
    ${upcoming.length
      ? `<div class="up-label">Coming up</div><div class="up-list">${upcoming.map((s,i)=>`
          <div class="up-item">
            <span class="up-num">${navStep+i+2}</span>
            <div><div class="up-street">${s.street}</div><div class="up-inst">${s.inst}</div></div>
            <span style="font-size:16px;margin-left:auto">${INST_ICON(s.inst)}</span>
          </div>`).join('')}</div>`
      : `<div class="empty" style="padding:16px 20px">🏁 Final step — return to Test Centre and park.</div>`
    }
    <div class="nav-ctrls">
      <button class="nbtn" ${navStep===0?'disabled':''} onclick="navGo(-1)">← Prev</button>
      <button class="nbtn" onclick="showTab('map')">🗺 Map</button>
      <button class="nbtn primary" ${isLast?'disabled':''} onclick="navGo(1)">${isLast?'Done ✓':'Next →'}</button>
    </div>`;
}

function navGo(dir) {
  navStep = Math.max(0, Math.min(selectedRoute.steps.length-1, navStep+dir));
  renderNav();
  // pan map to current step
  if (map && selectedRoute) {
    const s = selectedRoute.steps[navStep];
    map.setView([s.lat, s.lng], 16);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderRouteList();
// kick off GPS early so it's ready when map is opened
setTimeout(startGPS, 500);
</script>
